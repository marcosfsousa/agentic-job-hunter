name: "Marcos"

background: >
  2.5 years software engineering and tech lead experience (enterprise, client-facing projects).
  3 months hands-on AI engineering: built RAG pipelines, NLP systems, LLM fine-tuning workflows,
  and agentic applications. Strong on the application layer; weaker on MLOps, cloud infrastructure,
  and classical ML. Not a researcher — a builder.

ideal_role: >
  Building and deploying LLM-based applications, RAG pipelines, or NLP systems — not model research
  or classical ML. End-to-end ownership from prototype to deployed interface. Consulting-adjacent
  or product-facing. Small-to-mid size company, or a specialist AI/consulting unit within a larger
  company where individual contributions are visible.

deprioritise:
  - "Requires fluent German as a stated condition"
  - "Focused primarily on recommendation systems, forecasting, or classical ML pipelines"
  - "Heavy MLOps, Kubernetes, or cloud infrastructure as core job requirements"
  - "Primarily model research or academic role"
  - "Senior-level role requiring 5+ years dedicated ML engineering experience"

target_roles:
  - "ML Engineer"
  - "AI Engineer"
  - "Machine Learning Engineer"
  - "AI Application Engineer"
  - "GenAI Engineer"
  - "LLM Engineer"
  - "AI Software Engineer"

skills:
  strong:
    - RAG systems
    - LangChain / LangGraph
    - Vector databases (Pinecone, ChromaDB)
    - LLM application development
    - Prompt engineering
    - Sentence Transformers
    - HuggingFace ecosystem
    - "NLP pipelines"
    - "agentic systems"
    - "OpenAI API"
  working_knowledge:
    - Python
    - Docker
    - REST APIs
    - SQL
    - "Streamlit"
    - "scikit-learn"
  learning:
    - PyTorch
    - TensorFlow
    - MLflow
    - AWS SageMaker

location:
  target_countries: ["Germany", "Deutschland"]
  preferred_cities: ["Berlin", "Munich", "Hamburg", "Remote"]
  remote_acceptable: true
  eu_work_authorization: true

salary:
  minimum_annual_eur: 50000
  target_annual_eur: 65000
  currency: "EUR"

seniority:
  target: ["junior", "mid"]
  exclude: ["intern", "director", "vp"]
  max_years_experience: 4

dealbreakers:
  exclude_companies: []
  exclude_keywords:
    - "Unpaid"
    - "Volunteer"
    - "audio"
    - "QA"
    - "Kubernetes"
    - "Big Data"
    - "Recommendation Engine"
    - "Computer Vision"
    - "Robotics"
  require_any_keyword:
    - "machine learning"
    - "ML"
    - "AI"
    - "deep learning"
    - "NLP"
    - "LLM"
    - "data science"
    - "RAG"
    - "LangChain"
    - "agentic"
    - "generative AI"
    - "LLM application"

# Minimum LLM match score (1–10) to include a job in the email digest.
# Jobs below this threshold are still written to the daily digest file.
email_min_score: 5

# Search queries sent to JSearch (one API call per query).
# Deduplication handles overlap — tune queries to target different supply segments.
jsearch_queries:
  - "AI software engineer Germany"
  - "AI engineer startup Berlin Munich Hamburg"
  - "generative AI engineer English Germany"
